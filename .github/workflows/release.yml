name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Build: macOS arm64 ───────────────────────────────────────────────────────
  build-darwin-arm64:
    name: Build macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: build/cc-notify.app/Contents/MacOS/cc-notify --version

      - name: Package
        run: |
          cd build
          tar -czf ../cc-notify-darwin-arm64.tar.gz cc-notify.app

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: cc-notify-darwin-arm64.tar.gz

  # ── Build: macOS x64 ────────────────────────────────────────────────────────
  build-darwin-x64:
    name: Build macOS x64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: build/cc-notify.app/Contents/MacOS/cc-notify --version

      - name: Package
        run: |
          cd build
          tar -czf ../cc-notify-darwin-x64.tar.gz cc-notify.app

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-x64
          path: cc-notify-darwin-x64.tar.gz

  # ── Build: Linux x64 ────────────────────────────────────────────────────────
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libnotify-dev pkg-config

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: build/cc-notify --version

      - name: Package
        run: |
          cd build
          tar -czf ../cc-notify-linux-x64.tar.gz cc-notify

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: cc-notify-linux-x64.tar.gz

  # ── Build: Windows x64 ──────────────────────────────────────────────────────
  build-win32-x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: build\Release\cc-notify.exe --version

      - name: Package
        run: |
          cd build\Release
          Compress-Archive -Path cc-notify.exe, icon.png, icon.ico -DestinationPath ..\..\cc-notify-win32-x64.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: win32-x64
          path: cc-notify-win32-x64.zip

  # ── Publish to npm + create GitHub Release ──────────────────────────────────
  publish:
    name: Publish to npm
    needs:
      - build-darwin-arm64
      - build-darwin-x64
      - build-linux-x64
      - build-win32-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          VERSION="${TAG#v}"                # strip leading 'v'
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── Download all artifacts ─────────────────────────────────────────────
      - uses: actions/download-artifact@v4
        with:
          name: darwin-arm64
          path: artifacts/darwin-arm64

      - uses: actions/download-artifact@v4
        with:
          name: darwin-x64
          path: artifacts/darwin-x64

      - uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: artifacts/linux-x64

      - uses: actions/download-artifact@v4
        with:
          name: win32-x64
          path: artifacts/win32-x64

      # ── Unpack into sub-package bin/ directories ──────────────────────────
      - name: Unpack darwin-arm64
        run: |
          mkdir -p npm-packages/@cc-notify/darwin-arm64/bin
          tar -xzf artifacts/darwin-arm64/cc-notify-darwin-arm64.tar.gz \
              -C npm-packages/@cc-notify/darwin-arm64/bin
          chmod +x npm-packages/@cc-notify/darwin-arm64/bin/cc-notify.app/Contents/MacOS/cc-notify

      - name: Unpack darwin-x64
        run: |
          mkdir -p npm-packages/@cc-notify/darwin-x64/bin
          tar -xzf artifacts/darwin-x64/cc-notify-darwin-x64.tar.gz \
              -C npm-packages/@cc-notify/darwin-x64/bin
          chmod +x npm-packages/@cc-notify/darwin-x64/bin/cc-notify.app/Contents/MacOS/cc-notify

      - name: Unpack linux-x64
        run: |
          mkdir -p npm-packages/@cc-notify/linux-x64/bin
          tar -xzf artifacts/linux-x64/cc-notify-linux-x64.tar.gz \
              -C npm-packages/@cc-notify/linux-x64/bin
          chmod +x npm-packages/@cc-notify/linux-x64/bin/cc-notify

      - name: Unpack win32-x64
        run: |
          mkdir -p npm-packages/@cc-notify/win32-x64/bin
          cd npm-packages/@cc-notify/win32-x64/bin
          unzip -o ../../../../artifacts/win32-x64/cc-notify-win32-x64.zip

      # ── Inject version into all package.json files ────────────────────────
      - name: Set versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update main package.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '$VERSION';
            for (const k of Object.keys(p.optionalDependencies || {})) {
              p.optionalDependencies[k] = '$VERSION';
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          # Update sub-package package.json files
          for pkg in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            node -e "
              const fs = require('fs');
              const f = 'npm-packages/@cc-notify/$pkg/package.json';
              const p = JSON.parse(fs.readFileSync(f, 'utf8'));
              p.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(p, null, 2) + '\n');
            "
          done

      # ── Publish sub-packages first ─────────────────────────────────────────
      - name: Publish @cc-notify/darwin-arm64
        run: npm publish --access public
        working-directory: npm-packages/@cc-notify/darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cc-notify/darwin-x64
        run: npm publish --access public
        working-directory: npm-packages/@cc-notify/darwin-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cc-notify/linux-x64
        run: npm publish --access public
        working-directory: npm-packages/@cc-notify/linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cc-notify/win32-x64
        run: npm publish --access public
        working-directory: npm-packages/@cc-notify/win32-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish main package ───────────────────────────────────────────────
      - name: Publish cc-notify
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: cc-notify ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/darwin-arm64/cc-notify-darwin-arm64.tar.gz
            artifacts/darwin-x64/cc-notify-darwin-x64.tar.gz
            artifacts/linux-x64/cc-notify-linux-x64.tar.gz
            artifacts/win32-x64/cc-notify-win32-x64.zip
